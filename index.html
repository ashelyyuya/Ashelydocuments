<meta name="apple-mobile-web-app-title" content="記帳">
<meta name="application-name" content="記帳">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0e0e0e;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
#app{max-width:390px;margin:0 auto;padding:0 0 40px}
.topbar{padding:20px 16px 0;display:flex;align-items:flex-end;justify-content:space-between}
.month-label{font-size:12px;color:#888;letter-spacing:.5px;text-transform:uppercase}
.month-nav{display:flex;align-items:center;gap:8px}
.mnav-btn{background:none;border:none;color:#888;cursor:pointer;font-size:22px;padding:2px 6px;line-height:1}
.hero{padding:20px 16px 16px}
.hero-amount{font-size:46px;font-weight:300;letter-spacing:-2px;color:#f0f0f0;line-height:1}
.hero-sub{font-size:12px;color:#555;margin-top:6px;letter-spacing:.3px}
.tabs{display:flex;padding:0 16px;border-bottom:1px solid #333;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:56px;padding:11px 4px;font-size:12px;color:#555;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.2px;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:#f0f0f0;border-bottom-color:#f0f0f0}
.panel{padding:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;font-size:15px;color:#f0f0f0;outline:none;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:#444}
.field select option{background:#1a1a1a;color:#f0f0f0}
.field input::placeholder{color:#555}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.add-actions{display:flex;align-items:center;gap:10px;margin-top:6px}
.btn-primary{flex:1;padding:16px;background:#f0f0f0;color:#0e0e0e;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 12px rgba(240,240,240,0.15),0 2px 4px rgba(0,0,0,0.4)}
.btn-primary:active{opacity:.85}
.btn-export{background:transparent;border:1px solid #333;border-radius:8px;padding:10px 14px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.settle-btn{width:100%;margin-top:10px;padding:12px;background:transparent;border:1px solid #444;border-radius:8px;font-size:13px;color:#888;cursor:pointer;letter-spacing:.3px}
.settle-btn:active{background:#1a1a1a}
.settled-badge{display:inline-block;font-size:11px;color:#3aa87a;background:#0e2018;border-radius:4px;padding:2px 8px;margin-left:8px;vertical-align:middle}
.cat-section{margin-bottom:2px}
.cat-header{display:flex;align-items:center;padding:13px 16px;cursor:pointer;background:#1a1a1a;border-radius:8px;margin-bottom:2px;gap:10px}
.cat-header:active{background:#242424}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:13px;color:#f0f0f0}
.cat-meta{font-size:11px;color:#555;margin-right:6px}
.cat-total{font-size:14px;color:#f0f0f0;font-weight:500;min-width:58px;text-align:right}
.cat-arrow{font-size:11px;color:#555;transition:transform .18s;margin-left:4px;display:inline-block}
.cat-arrow.open{transform:rotate(90deg)}
.cat-items{background:#1a1a1a;border-radius:8px;margin-bottom:2px;overflow:hidden}
.rec-row{display:flex;align-items:center;padding:11px 16px;border-top:1px solid #333;gap:10px}
.rec-row:first-child{border-top:none}
.rec-info{flex:1;min-width:0}
.rec-desc{font-size:13px;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-date{font-size:11px;color:#555;margin-top:2px}
.rec-amt{font-size:14px;color:#e05550;font-weight:500;flex-shrink:0}
.rec-del{background:none;border:none;color:#555;cursor:pointer;font-size:20px;padding:0 0 0 8px;line-height:1}
.empty{text-align:center;padding:56px 24px;color:#555;font-size:13px;line-height:2}
.stat-hero{padding:0 0 16px;border-bottom:1px solid #333;margin-bottom:16px;display:flex;align-items:flex-end;justify-content:space-between}
.stat-total-lbl{font-size:11px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.stat-total{font-size:36px;font-weight:300;color:#f0f0f0;letter-spacing:-1px}
.vs-badge{text-align:right}
.vs-lbl{font-size:11px;color:#555;margin-bottom:4px}
.vs-val{font-size:15px;font-weight:500}
.vs-up{color:#e05550}
.vs-down{color:#3aa87a}
.vs-same{color:#888}
.pie-wrap{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:16px;background:#1a1a1a;border-radius:10px}
.pie-legend{flex:1;min-width:0}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-pct{font-size:12px;color:#f0f0f0;font-weight:500;flex-shrink:0}
.bar-item{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bar-info{flex:1;min-width:0}
.bar-name{font-size:12px;color:#888;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:2px;background:#242424;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.bar-right{text-align:right;min-width:60px}
.bar-val{font-size:13px;color:#f0f0f0;display:block}
.bar-pct{font-size:11px;color:#555}
/* Year table */
.year-hero{padding:0 0 16px;border-bottom:1px solid #333;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end}
.year-total-lbl{font-size:11px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.year-total{font-size:32px;font-weight:300;color:#f0f0f0;letter-spacing:-1px}
.year-avg{font-size:12px;color:#555;text-align:right}
.year-avg span{display:block;font-size:13px;color:#e8a030;margin-top:2px}
.month-table{width:100%;border-collapse:collapse}
.month-table th{font-size:11px;color:#555;letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid #242424}
.month-table th:last-child{text-align:right}
.month-table td{padding:12px 12px;border-bottom:1px solid #1a1a1a;font-size:13px;color:#f0f0f0}
.month-table td:last-child{text-align:right;color:#e05550;font-weight:500}
.month-table tr.current-month td{color:#f0f0f0;background:#1a1a1a}
.month-table tr.current-month td:last-child{color:#e05550}
.month-table td.no-data{color:#555}
.month-bar-wrap{display:flex;align-items:center;gap:8px}
.month-bar-track{flex:1;height:2px;background:#242424;border-radius:2px;overflow:hidden}
.month-bar-fill{height:100%;background:#e05550;border-radius:2px}
.settled-tag{font-size:10px;color:#3aa87a;margin-left:6px}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#f0f0f0;color:#0e0e0e;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div><div class="month-label" id="month-label">本月支出</div></div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <span style="font-size:13px;color:#f0f0f0;min-width:60px;text-align:center;font-weight:400" id="month-nav-label"></span>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="hero">
    <div class="hero-amount" id="hero-amount">$0</div>
    <div class="hero-sub" id="hero-sub">尚無記錄</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">記帳</button>
    <button class="tab" onclick="switchTab('list')">明細</button>
    <button class="tab" onclick="switchTab('stats')">統計</button>
    <button class="tab" onclick="switchTab('year')">今年總計</button>
  </div>

  <!-- 記帳 -->
  <div id="tab-add" class="panel">
    <div class="field">
      <label>金額</label>
      <input type="number" id="inp-amount" placeholder="0" min="0" inputmode="decimal">
    </div>
    <div class="row2">
      <div class="field">
        <label>分類</label>
        <select id="inp-cat">
          <option>個人吃飯</option>
          <option>汽車加油或保養</option>
          <option>遊戲</option>
          <option>APP相關</option>
          <option>寵物用品</option>
          <option>社交</option>
          <option>生活雜物</option>
          <option>房租水電基本開支</option>
          <option>醫療</option>
          <option>其他</option>
        </select>
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="inp-date">
      </div>
    </div>
    <div class="field">
      <label>說明</label>
      <input type="text" id="inp-desc" placeholder="備註（可選）">
    </div>
    <div class="add-actions">
      <button class="btn-primary" onclick="addRecord()">新增</button>
      <button class="btn-export" onclick="exportExcel()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v8M5 7l3 3 3-3"/><rect x="2" y="11" width="12" height="3" rx="1"/>
        </svg>
        Excel
      </button>
      <button id="settle-btn" onclick="settleMonth()" style="background:#c04040;border:none;border-radius:8px;padding:10px 14px;font-size:12px;color:#fff;cursor:pointer;font-weight:500;letter-spacing:.3px;box-shadow:0 3px 8px rgba(192,64,64,0.4),0 1px 3px rgba(0,0,0,0.4);white-space:nowrap">結算本月</button>
    </div>

    <div style="font-size:11px;color:#555;margin-top:8px;text-align:center" id="settle-hint"></div>
  </div>

  <!-- 明細 -->
  <div id="tab-list" class="panel" style="display:none">
    <div id="cat-list"></div>
  </div>

  <!-- 統計 -->
  <div id="tab-stats" class="panel" style="display:none">
    <div class="stat-hero">
      <div>
        <div class="stat-total-lbl">支出總計</div>
        <div class="stat-total" id="stat-total">$0</div>
      </div>
    </div>
    <div class="pie-wrap" id="pie-wrap" style="display:none">
      <canvas id="pie-canvas" width="110" height="110" style="flex-shrink:0"></canvas>
      <div class="pie-legend" id="pie-legend"></div>
    </div>
    <div id="stat-bars"></div>
  </div>

  <!-- 今年總計 -->
  <div id="tab-year" class="panel" style="display:none">
    <div class="year-hero">
      <div>
        <div class="year-total-lbl">今年總支出</div>
        <div class="year-total" id="year-total">$0</div>
      </div>
      <div class="year-avg">
        <div style="font-size:11px;color:#555">月均支出</div>
        <span id="year-avg">$0</span>
      </div>
    </div>
    <table class="month-table">
      <thead>
        <tr>
          <th>月份</th>
          <th>筆數</th>
          <th style="text-align:right">支出</th>
        </tr>
      </thead>
      <tbody id="year-tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const CATS=['個人吃飯','汽車加油或保養','遊戲','APP相關','寵物用品','社交','生活雜物','房租水電基本開支','醫療','其他'];
const COLORS=['#e05550','#5b8dee','#e8a030','#7b68ee','#3aa87a','#e07090','#50b8d8','#b88030','#88a850','#888888'];

let records=JSON.parse(localStorage.getItem('dark_exp')||'[]');
let settledMonths=JSON.parse(localStorage.getItem('settled_months')||'[]');
let openCats={};
let viewMonth=new Date().toISOString().slice(0,7);

function save(){
  localStorage.setItem('dark_exp',JSON.stringify(records));
  localStorage.setItem('settled_months',JSON.stringify(settledMonths));
}
function today(){return new Date().toISOString().slice(0,10);}
function fmtMonth(m){const[y,mo]=m.split('-');return y+'年'+parseInt(mo)+'月';}
function curMonth(){return new Date().toISOString().slice(0,7);}
function prevMonth(m){
  const[y,mo]=m.split('-').map(Number);
  const nd=new Date(y,mo-2,1);
  return nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
}
function changeMonth(d){
  const[y,mo]=viewMonth.split('-').map(Number);
  const nd=new Date(y,mo-1+d,1);
  viewMonth=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  updateAll();
}
function monthData(m){return records.filter(r=>r.date&&r.date.startsWith(m||viewMonth));}
function isSettled(m){return settledMonths.includes(m);}

function settleMonth(){
  const cm=curMonth();
  if(viewMonth!==cm){toast('只能結算當月');return;}
  if(isSettled(cm)){toast('本月已結算');return;}
  const data=monthData(cm);
  if(!data.length){toast('本月尚無記錄');return;}
  if(!confirm('確定結算 '+fmtMonth(cm)+'？\n結算後本月記錄將封存，無法再修改或刪除。')){return;}
  settledMonths.push(cm);
  save();
  updateAll();
  toast('結算完成！');
}

function updateHeader(){
  const data=monthData(viewMonth);
  const total=data.reduce((a,r)=>a+r.amount,0);
  document.getElementById('hero-amount').textContent='$'+total.toLocaleString();
  document.getElementById('month-nav-label').textContent=fmtMonth(viewMonth);
  const cm=curMonth();
  document.getElementById('month-label').textContent=viewMonth===cm?'本月支出':fmtMonth(viewMonth)+' 支出';
  document.getElementById('hero-sub').textContent=data.length?data.length+'筆記錄':'尚無記錄';

  // settle button
  const btn=document.getElementById('settle-btn');
  const hint=document.getElementById('settle-hint');
  if(viewMonth!==cm){
    btn.style.display='none';hint.textContent='';
  } else if(isSettled(cm)){
    btn.style.display='none';
    hint.textContent='✓ 本月已結算';hint.style.color='#3aa87a';
  } else {
    btn.style.display='block';
    hint.textContent='結算後本月記錄封存，新月份從 $0 開始';
  }
}

function addRecord(){
  const cm=curMonth();
  if(isSettled(viewMonth)&&viewMonth===cm){toast('本月已結算，無法新增');return;}
  const amt=parseFloat(document.getElementById('inp-amount').value);
  if(!amt||amt<=0){toast('請輸入正確金額');return;}
  const date=document.getElementById('inp-date').value||today();
  const month=date.slice(0,7);
  if(isSettled(month)){toast(fmtMonth(month)+'已結算，無法新增');return;}
  records.unshift({id:Date.now(),amount:amt,category:document.getElementById('inp-cat').value,desc:document.getElementById('inp-desc').value||'',date});
  save();
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-desc').value='';
  updateAll();toast('已新增');
}

function delRecord(id,month){
  if(isSettled(month)){toast(fmtMonth(month)+'已結算，無法刪除');return;}
  if(!confirm('確定刪除這筆記錄？'))return;
  records=records.filter(r=>r.id!==id);
  save();updateAll();
}

function renderList(){
  const data=monthData(viewMonth);
  const el=document.getElementById('cat-list');
  const settled=isSettled(viewMonth);
  if(!data.length){
    el.innerHTML='<div class="empty">本月尚無支出記錄</div>';return;
  }
  const bycat={};CATS.forEach(c=>{bycat[c]=[];});
  data.forEach(r=>{if(!bycat[r.category])bycat[r.category]=[];bycat[r.category].push(r);});
  el.innerHTML=CATS.filter(c=>bycat[c]&&bycat[c].length).map(cat=>{
    const items=bycat[cat];
    const total=items.reduce((a,r)=>a+r.amount,0);
    const isOpen=!!openCats[cat];
    const col=COLORS[CATS.indexOf(cat)];
    const safecat=cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="cat-section">
      <div class="cat-header" onclick="toggleCat('${safecat}')">
        <div class="cat-dot" style="background:${col}"></div>
        <div class="cat-name">${cat}</div>
        <div class="cat-meta">${items.length}筆</div>
        <div class="cat-total">$${total.toLocaleString()}</div>
        <span class="cat-arrow${isOpen?' open':''}">›</span>
      </div>
      ${isOpen?`<div class="cat-items">${items.map(r=>`
        <div class="rec-row">
          <div class="rec-info">
            <div class="rec-desc">${r.desc||r.category}</div>
            <div class="rec-date">${r.date}</div>
          </div>
          <div class="rec-amt">$${r.amount.toLocaleString()}</div>
          ${settled?'<span style="font-size:18px;color:#333;padding-left:8px">🔒</span>':`<button class="rec-del" onclick="delRecord(${r.id},'${r.date.slice(0,7)}')">×</button>`}
        </div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function toggleCat(cat){openCats[cat]=!openCats[cat];renderList();}

function drawPie(sorted,total){
  const canvas=document.getElementById('pie-canvas');
  const ctx=canvas.getContext('2d');
  const cx=55,cy=55,r=50;
  ctx.clearRect(0,0,110,110);
  let angle=-Math.PI/2;
  sorted.forEach(([cat,val])=>{
    const slice=(val/total)*Math.PI*2;
    const col=COLORS[CATS.indexOf(cat)%COLORS.length];
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();ctx.fillStyle=col;ctx.fill();
    angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
}

function renderStats(){
  const data=monthData(viewMonth);
  const total=data.reduce((a,r)=>a+r.amount,0);
  document.getElementById('stat-total').textContent='$'+total.toLocaleString();

  const bycat={};
  data.forEach(r=>{bycat[r.category]=(bycat[r.category]||0)+r.amount;});
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?sorted[0][1]:1;
  const el=document.getElementById('stat-bars');
  const pieWrap=document.getElementById('pie-wrap');
  if(!sorted.length){pieWrap.style.display='none';el.innerHTML='<div class="empty">本月尚無資料</div>';return;}
  pieWrap.style.display='flex';
  drawPie(sorted,total);
  document.getElementById('pie-legend').innerHTML=sorted.slice(0,6).map(([cat,val])=>{
    const pct=total>0?Math.round(val/total*100):0;
    const col=COLORS[CATS.indexOf(cat)%COLORS.length];
    return `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div><div class="legend-name">${cat}</div><div class="legend-pct">${pct}%</div></div>`;
  }).join('');
  el.innerHTML=sorted.map(([cat,val])=>{
    const pct=total>0?Math.round(val/total*100):0;
    const col=COLORS[CATS.indexOf(cat)%COLORS.length];
    return `<div class="bar-item">
      <div class="bar-dot" style="background:${col}"></div>
      <div class="bar-info">
        <div class="bar-name">${cat}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${col}"></div></div>
      </div>
      <div class="bar-right"><span class="bar-val">$${val.toLocaleString()}</span><span class="bar-pct">${pct}%</span></div>
    </div>`;
  }).join('');
}

function renderYear(){
  const year=new Date().getFullYear();
  const cm=curMonth();
  let yearTotal=0;
  let monthCount=0;
  const months=[];
  for(let m=1;m<=12;m++){
    const key=year+'-'+String(m).padStart(2,'0');
    const data=monthData(key);
    const total=data.reduce((a,r)=>a+r.amount,0);
    months.push({key,total,count:data.length,settled:isSettled(key)});
    if(total>0){yearTotal+=total;monthCount++;}
  }
  document.getElementById('year-total').textContent='$'+yearTotal.toLocaleString();
  document.getElementById('year-avg').textContent=monthCount>0?'$'+Math.round(yearTotal/monthCount).toLocaleString():'$0';

  const maxM=Math.max(...months.map(m=>m.total),1);
  const tbody=document.getElementById('year-tbody');
  tbody.innerHTML=months.map(({key,total,count,settled})=>{
    const isCur=key===cm;
    const isFuture=key>cm;
    const barW=total>0?Math.round(total/maxM*100):0;
    return `<tr class="${isCur?'current-month':''}">
      <td>${parseInt(key.split('-')[1])}月${settled?'<span class="settled-tag">✓已結算</span>':isCur?'<span style="font-size:10px;color:#888;margin-left:6px">進行中</span>':''}</td>
      <td class="${isFuture&&!total?'no-data':''}">${isFuture&&!total?'—':count+'筆'}</td>
      <td>
        ${isFuture&&!total?'<span class="no-data">—</span>':`
        <div class="month-bar-wrap">
          <div class="month-bar-track"><div class="month-bar-fill" style="width:${barW}%"></div></div>
          <span>$${total.toLocaleString()}</span>
        </div>`}
      </td>
    </tr>`;
  }).join('');
}

function hex2rgb(hex){
  return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}
function lighten(hex,f=0.80){
  const[r,g,b]=hex2rgb(hex);
  const lr=Math.round(r+(255-r)*f);
  const lg=Math.round(g+(255-g)*f);
  const lb=Math.round(b+(255-b)*f);
  return[lr,lg,lb].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

const MUTED_COLORS={
  '個人吃飯':'C17F7F',
  '汽車加油或保養':'7A92B8',
  '遊戲':'A08FC0',
  'APP相關':'6FA8A0',
  '寵物用品':'B89A6A',
  '社交':'B87A8A',
  '生活雜物':'8AAA8A',
  '房租水電基本開支':'7A8FAA',
  '醫療':'AA8A7A',
  '其他':'909090'
};

function mkBorder(color,style='thin'){
  return{top:{style,color:{rgb:color}},bottom:{style,color:{rgb:color}},left:{style,color:{rgb:color}},right:{style,color:{rgb:color}}};
}

function exportExcel(){
  if(!records.length){toast('尚無記錄可匯出');return;}
  if(typeof XLSX==='undefined'){toast('請稍候再試');return;}
  const wb=XLSX.utils.book_new();
  const months=[...new Set(records.map(r=>r.date.slice(0,7)))].sort().reverse();

  months.forEach(m=>{
    const data=records.filter(r=>r.date.startsWith(m));
    if(!data.length)return;

    const bycat={};
    CATS.forEach(c=>{bycat[c]=[];});
    data.forEach(r=>{if(!bycat[r.category])bycat[r.category]=[];bycat[r.category].push(r);});

    const wsData=[];
    const styles=[];

    const headerStyle={
      font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:11},
      fill:{patternType:'solid',fgColor:{rgb:'2C2C2C'}},
      alignment:{horizontal:'center',vertical:'center'},
      border:mkBorder('444444')
    };

    wsData.push(['分類','說明','日期','金額']);
    styles.push({type:'header'});

    CATS.filter(c=>bycat[c]&&bycat[c].length).forEach(cat=>{
      const items=bycat[cat].sort((a,b)=>a.date.localeCompare(b.date));
      const col=MUTED_COLORS[cat]||'909090';
      const light=lighten(col,0.80);
      const subtotal=items.reduce((a,r)=>a+r.amount,0);

      wsData.push([cat,'','',null]);
      styles.push({type:'catTitle',col});

      items.forEach(r=>{
        wsData.push(['',r.desc||'—',r.date,r.amount]);
        styles.push({type:'record',col,light});
      });

      wsData.push(['','小計','',subtotal]);
      styles.push({type:'subtotal',col});

      wsData.push(['','','',null]);
      styles.push({type:'blank'});
    });

    const grand=data.reduce((a,r)=>a+r.amount,0);
    wsData.push(['本月總支出','','',grand]);
    styles.push({type:'total'});

    const ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:18},{wch:24},{wch:14},{wch:14}];
    ws['!freeze']={xSplit:0,ySplit:1,topLeftCell:'A2',activePane:'bottomLeft'};
    ws['!autofilter']={ref:'A1:D1'};

    const cols=['A','B','C','D'];
    wsData.forEach((row,ri)=>{
      const s=styles[ri];
      cols.forEach((col,ci)=>{
        const addr=col+(ri+1);
        if(!ws[addr])ws[addr]={t:'z',v:''};
        if(s.type==='header'){
          ws[addr].s=headerStyle;
        } else if(s.type==='catTitle'){
          ws[addr].s={font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:10},fill:{patternType:'solid',fgColor:{rgb:s.col}},alignment:{horizontal:'left',vertical:'center'},border:mkBorder(s.col)};
        } else if(s.type==='record'){
          ws[addr].s={font:{color:{rgb:'333333'},name:'Arial',sz:10},fill:{patternType:'solid',fgColor:{rgb:s.light}},alignment:{horizontal:ci===3?'right':'left',vertical:'center'},border:mkBorder('E0E0E0'),numFmt:ci===3?'"$"#,##0':''};
        } else if(s.type==='subtotal'){
          ws[addr].s={font:{bold:true,color:{rgb:'555555'},name:'Arial',sz:10},fill:{patternType:'solid',fgColor:{rgb:'F0F0F0'}},alignment:{horizontal:ci===1||ci===3?'right':'left',vertical:'center'},border:{top:{style:'thin',color:{rgb:s.col}},bottom:{style:'medium',color:{rgb:s.col}},left:{style:'thin',color:{rgb:'DDDDDD'}},right:{style:'thin',color:{rgb:'DDDDDD'}}},numFmt:ci===3?'"$"#,##0':''};
        } else if(s.type==='total'){
          ws[addr].s={font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:12},fill:{patternType:'solid',fgColor:{rgb:'3A3A3A'}},alignment:{horizontal:ci===0||ci===3?'right':'left',vertical:'center'},border:mkBorder('222222','medium'),numFmt:ci===3?'"$"#,##0':''};
        }
      });
    });

    XLSX.utils.book_append_sheet(wb,ws,fmtMonth(m));
  });

  // 年度摘要
  const year=new Date().getFullYear();
  const sumData=[['月份','筆數','總支出']];
  let yt=0,yc=0;
  for(let mo=1;mo<=12;mo++){
    const key=year+'-'+String(mo).padStart(2,'0');
    const md=records.filter(r=>r.date.startsWith(key));
    const mt=md.reduce((a,r)=>a+r.amount,0);
    sumData.push([parseInt(mo)+'月',md.length||'—',mt||'—']);
    yt+=mt;yc+=md.length;
  }
  sumData.push(['全年合計',yc,yt]);
  const wsSum=XLSX.utils.aoa_to_sheet(sumData);
  wsSum['!cols']=[{wch:10},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb,wsSum,year+'年度摘要');

  if(!wb.SheetNames.length){toast('尚無記錄可匯出');return;}
  XLSX.writeFile(wb,'支出記帳_'+today()+'.xlsx');
  toast('匯出成功！');
}

function exportCSV(){
  if(!records.length){toast('尚無記錄可匯出');return;}
  const header=['日期','分類','說明','金額'];
  const rows=[header];
  const sorted=[...records].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(r=>{
    rows.push([r.date, r.category, r.desc||'', r.amount]);
  });
  const csv=rows.map(row=>row.map(v=>{
    const s=String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const bom='\uFEFF';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='支出記帳_'+today()+'.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSV 匯出成功！');
}

function switchTab(t){
  ['add','list','stats','year'].forEach((n,i)=>{
    document.getElementById('tab-'+n).style.display=n===t?'block':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===t);
  });
  if(t==='list')renderList();
  if(t==='stats')renderStats();
  if(t==='year')renderYear();
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

function updateAll(){
  updateHeader();
  const idx=Array.from(document.querySelectorAll('.tab')).findIndex(b=>b.classList.contains('active'));
  const t=['add','list','stats','year'][idx];
  if(t==='list')renderList();
  if(t==='stats')renderStats();
  if(t==='year')renderYear();
}
